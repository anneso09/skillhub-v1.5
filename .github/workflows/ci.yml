name: CI/CD SkillHub

# Déclenchement sur push vers main/dev et sur toute PR vers ces branches
on:
  push:
    branches: [main, dev]
  pull_request:
    branches: [main, dev]

jobs:
  # ── JOB 1 : CI — Install, Lint, Test, Build ──────────────────
  ci:
    runs-on: ubuntu-latest

    steps:
      # 1. Récupère le code du dépôt
      - name: Checkout code
        uses: actions/checkout@v4

      # 2. ── BACKEND Laravel ────────────────────────────────────
      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: "8.2"
          extensions: pdo, pdo_mysql, mbstring, mongodb
          coverage: none

      - name: Install PHP dependencies
        working-directory: skillhub-backend
        # En CI on installe AVEC les dépendances dev pour avoir PHPUnit
        run: composer install --optimize-autoloader --no-interaction --no-scripts --ignore-platform-req=ext-mongodb

      - name: Copy .env for tests
        working-directory: skillhub-backend
        run: cp .env.example .env

      - name: Generate app key
        working-directory: skillhub-backend
        run: php artisan key:generate

      - name: Run Laravel tests
        working-directory: skillhub-backend
        run: php artisan test
        env:
          DB_CONNECTION: sqlite
          DB_DATABASE: ":memory:"
          MONGO_URI: "mongodb://localhost:27017/test"
          JWT_SECRET: "ci_test_secret_key_pour_les_tests"

      # 3. ── FRONTEND React ─────────────────────────────────────
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: skillhub-frontend/package-lock.json

      - name: Install Node dependencies
        working-directory: skillhub-frontend
        run: npm ci

      - name: Lint frontend
        working-directory: skillhub-frontend
        run: npm run lint --if-present

      - name: Build frontend
        working-directory: skillhub-frontend
        run: npm run build

      # 4. ── BUILD image Docker taguée avec le git SHA ─────────
      - name: Build Docker image API
        run: |
          docker build \
            -t skillhub-api:${{ github.sha }} \
            ./skillhub-backend

  # ── JOB 2 : CD — Push image vers registry ────────────────────
  # Se déclenche UNIQUEMENT après merge sur main
  cd:
    runs-on: ubuntu-latest
    needs: ci
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      # Connexion à Docker Hub avec les secrets GitHub
      # Les credentials ne sont JAMAIS en clair dans ce fichier
      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      # Build et push de l'image taguée avec le git SHA
      - name: Build and push API image
        run: |
          docker build \
            -t ${{ secrets.DOCKERHUB_USERNAME }}/skillhub-api:${{ github.sha }} \
            -t ${{ secrets.DOCKERHUB_USERNAME }}/skillhub-api:latest \
            ./skillhub-backend
          docker push ${{ secrets.DOCKERHUB_USERNAME }}/skillhub-api:${{ github.sha }}
          docker push ${{ secrets.DOCKERHUB_USERNAME }}/skillhub-api:latest
