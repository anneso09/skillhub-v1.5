services:

  # ── Base de données MySQL ─────────────────────────────────────
  db:
    image: mysql:8.0
    # Tag précis, jamais "latest" — pour éviter les surprises de version
    environment:
      MYSQL_DATABASE: ${DB_DATABASE}
      MYSQL_USER: ${DB_USERNAME}
      MYSQL_PASSWORD: ${DB_PASSWORD}
      MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASSWORD}
    volumes:
      # Volume nommé = les données survivent si le container redémarre
      - mysql_data:/var/lib/mysql
    networks:
      - skillhub_network
    healthcheck:
      # Docker attend que MySQL soit vraiment prêt avant de démarrer l'API
      # Sans ça, Laravel essaie de se connecter avant que MySQL soit up → erreur
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-p${DB_ROOT_PASSWORD}"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    mem_limit: 512m
    cpus: "0.5"

  # ── MongoDB (logs activity_logs) ──────────────────────────────
  mongodb:
    image: mongo:7.0
    ports:
      - "27019:27017"
    volumes:
      - mongo_data:/data/db
    networks:
      - skillhub_network
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    mem_limit: 512m
    cpus: "0.5"

  # ── API Laravel ───────────────────────────────────────────────
  api:
    build:
      context: ./skillhub-backend
      dockerfile: Dockerfile
    environment:
      # Ces valeurs viennent du fichier .env à la racine
      DB_CONNECTION: mysql
      DB_HOST: db        # "db" = nom du service MySQL ci-dessus
      DB_PORT: 3306
      DB_DATABASE: ${DB_DATABASE}
      DB_USERNAME: ${DB_USERNAME}
      DB_PASSWORD: ${DB_PASSWORD}
      MONGO_URI: mongodb://mongodb:27017/${MONGO_DB}
      JWT_SECRET: ${JWT_SECRET}
      APP_KEY: ${APP_KEY}
      APP_ENV: production
      APP_DEBUG: "false"
    depends_on:
      db:
        # Laravel ne démarre QUE quand MySQL répond au healthcheck
        condition: service_healthy
      mongodb:
        condition: service_healthy
    networks:
      - skillhub_network
    ports:
      - "8000:8000"
    restart: unless-stopped
    mem_limit: 512m
    cpus: "0.5"

  # ── Frontend React (Nginx) ────────────────────────────────────
  frontend:
    build:
      context: ./skillhub-frontend
      dockerfile: Dockerfile
    depends_on:
      - api
    networks:
      - skillhub_network
    ports:
      - "80:80"
    restart: unless-stopped
    mem_limit: 256m
    cpus: "0.5"

# ── Volumes nommés ────────────────────────────────────────────
# Les données persistent même si on fait "docker compose down"
volumes:
  mysql_data:
  mongo_data:

# ── Réseau interne isolé ──────────────────────────────────────
# Les containers se parlent entre eux par leur nom de service
# mais sont isolés du reste de la machine
networks:
  skillhub_network:
    driver: bridge